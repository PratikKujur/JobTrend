version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=data/jobs.db

  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      - api
    command: streamlit run dashboard/app.py
    volumes:
      - ./data:/app/data